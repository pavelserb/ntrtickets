name: Collect ticket sales

on:
  schedule:
    - cron: '0 5 * * *'     # daily at 05:00 UTC  
  workflow_dispatch:          # manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore sales.db from previous run
        uses: dawidd6/action-download-artifact@v6
        with:
          name: sales-db
          path: .
          search_artifacts: true
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Run collector
        env:
          BILESU_SERVISS_EMAIL: ${{ secrets.BILESU_SERVISS_EMAIL }}
          BILESU_SERVISS_PASSWORD: ${{ secrets.BILESU_SERVISS_PASSWORD }}
          MTICKET_DB_HOST: ${{ secrets.MTICKET_DB_HOST }}
          MTICKET_DB_PORT: ${{ secrets.MTICKET_DB_PORT }}
          MTICKET_DB_USER: ${{ secrets.MTICKET_DB_USER }}
          MTICKET_DB_PASSWORD: ${{ secrets.MTICKET_DB_PASSWORD }}
          MTICKET_DB_NAME: ${{ secrets.MTICKET_DB_NAME }}
          PASSO_USERNAME: ${{ secrets.PASSO_USERNAME }}
          PASSO_PASSWORD: ${{ secrets.PASSO_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python collector.py -v

      - name: Save sales.db
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sales-db
          path: sales.db
          retention-days: 90
          overwrite: true

      - name: Upload reports to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

  deploy-pages:
    needs: collect
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
